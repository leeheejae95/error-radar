spring:
  datasource:
    url: jdbc:mysql://localhost:3306/errorradar
    username: errorradar
    password: errorradar
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 에러 임계치 설정
alert:
  threshold:
    count: 50        # 에러 발생 횟수
    window-minutes: 30  # 시간 윈도우 (분)
  slack:
    webhook-url: "https://hooks.slack.com/services/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"